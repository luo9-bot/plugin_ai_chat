name: Build and Release Plugin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  PLUGIN_NAME: "top_drluo_luo9_ai_chat"

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Build release
        run: cargo build --release

      - name: Verify build artifacts
        run: |
          echo "Linux build artifacts:"
          ls -la target/release/libtop_drluo_luo9_ai_chat.so
          file target/release/libtop_drluo_luo9_ai_chat.so

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai_chat-linux
          path: target/release/libtop_drluo_luo9_ai_chat.so
          if-no-files-found: error
          retention-days: 7

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build release
        run: cargo build --release

      - name: Prepare Windows artifacts
        shell: bash
        run: |
          if [ -f "target/release/top_drluo_luo9_ai_chat.dll" ]; then
            echo "Found dll"
          fi
          ls -la target/release/*.dll target/release/*.lib 2>/dev/null || echo "Checking..."

      - name: Verify build artifacts
        shell: bash
        run: |
          echo "Windows build artifacts:"
          ls -la target/release/top_drluo_luo9_ai_chat.* || echo "No files found"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai_chat-windows
          path: |
            target/release/top_drluo_luo9_ai_chat.dll
            target/release/top_drluo_luo9_ai_chat.dll.lib
          if-no-files-found: error
          retention-days: 7

  create-release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        run: |
          cat > RELEASE_NOTES.md << 'EOF'
          # top.drluo.luo9-ai-chat 插件发布

          AI 对话插件 - 记忆/人格/情绪/主动对话系统

          ## 文件说明
          - Linux: libtop_drluo_luo9_ai_chat.so (动态链接库)
          - Windows: top_drluo_luo9_ai_chat.dll (动态链接库)

          ## 安装说明
          将对应的动态库文件放置到 Luo9 Bot 插件目录中。

          ## 配置
          1. 复制 config.example.yaml 为 config.yaml
          2. 填入 API 配置
          3. 在 prompts/ 目录下放置提示词文件
          EOF

      - name: Determine if prerelease
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *"alpha"* ]] || [[ "$TAG" == *"beta"* ]] || [[ "$TAG" == *"rc"* ]] || [[ "$TAG" == *"pre"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create plugin package
        run: |
          mkdir -p plugin_package/linux
          mkdir -p plugin_package/windows
          mkdir -p plugin_package/prompts

          cp artifacts/ai_chat-linux/libtop_drluo_luo9_ai_chat.so plugin_package/linux/
          cp artifacts/ai_chat-windows/top_drluo_luo9_ai_chat.dll plugin_package/windows/
          cp artifacts/ai_chat-windows/top_drluo_luo9_ai_chat.dll.lib plugin_package/windows/ 2>/dev/null || true
          cp prompts/*.txt plugin_package/prompts/
          cp config.example.yaml plugin_package/

          cat > plugin_package/README.md << 'EOF'
          # top.drluo.luo9-ai-chat

          ## 安装
          Linux: 将 linux/libtop_drluo_luo9_ai_chat.so 复制到插件目录
          Windows: 将 windows/top_drluo_luo9_ai_chat.dll 复制到插件目录

          ## 配置
          复制 config.example.yaml 为 config.yaml，填入 API 配置。
          将 prompts/ 目录复制到插件目录。
          EOF

          cd plugin_package
          zip -r ../ai_chat-${{ github.ref_name }}.zip .
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: ai_chat ${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            ai_chat-${{ github.ref_name }}.zip
            artifacts/ai_chat-linux/libtop_drluo_luo9_ai_chat.so
            artifacts/ai_chat-windows/top_drluo_luo9_ai_chat.dll
          draft: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup:
    needs: [create-release]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Delete artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            ai_chat-linux
            ai_chat-windows
          failOnError: false
