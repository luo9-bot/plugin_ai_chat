# ============================================================
#  top.drluo.luo9-ai-chat 配置文件
#  复制此文件为 config.yaml 并填入实际配置
# ============================================================

# ── API 配置 (必填) ─────────────────────────────────────────────
# OpenAI 兼容接口，支持 DeepSeek / OpenAI / 通义千问 / 硅基流动等

api_key: "sk-xxxxxxxxxxxxxxxxxxxxxxxx"
base_url: "https://api.deepseek.com"
model: "deepseek-chat"

# 机器人自身 QQ 号 (必填)
# 用于判断群消息是否 @了机器人，0 = 未配置（回复所有消息）
self_qq: 123456789

# 管理员 QQ 号 (控制命令权限)
# 只有此人可以使用 "开启对话"、"停!"、"人格管理" 等控制命令
# 设为 0 则所有人可用 (向后兼容)
admin_qq: 123456789

# 认定的人的 QQ 号 (可选)
# 对这个人会有特殊的情感反应：更温柔、更愿意配合、语气更亲密
# 设为 0 则不启用此功能
darling_qq: 0

# ── 识图功能 (可选) ─────────────────────────────────────────────
# 配置后 bot 能识别群聊中的图片/表情包，理解其内容后再决定是否回复
# api_key 为空则禁用识图，图片消息会被忽略
vision:
  api_key: ""                                    # 识图 API key，留空 = 禁用
  base_url: "https://ark.cn-beijing.volces.com/api/v3"  # API 地址
  model: "doubao-seed-1-8-251228"                # 识图模型
  max_tokens: 256

# ── 提示词 ─────────────────────────────────────────────────────
# 放在 prompts/ 目录下的文件名

prompts: "default.txt"

# ── 远程同步 (可选) ─────────────────────────────────────────────
# 将自我记忆同步到远程 MongoDB，通过 memory-viewer 网页浏览
# 安全机制: 首次运行自动生成 ECC 密钥对 (data/plugin_ai_chat/ecc_key.pem)
#           所有写入请求通过 ECDSA-P256 签名验证，无需手动配置密钥
sync:
  enabled: false              # 是否启用远程同步
  api_url: ""                 # memory-viewer API 地址，如 "https://xxx.vercel.app"
  db_name: "memory_default"   # 数据库名称 (每个实例应该不同)
  mongodb_uri: ""             # MongoDB 连接字符串，注册时传递给网页端
  display_name: ""            # 显示名称 (暴露时在网页端显示)
  icon: "💭"                  # 显示图标
  expose: false               # 是否向主网页暴露 (允许被其他用户浏览)


# ── 管理后台 (可选) ─────────────────────────────────────────────
# 本地 Web 管理面板，用于可视化管理所有记忆数据
# token 为空则不启动管理后台
admin:
  token: ""                    # 管理员登录令牌 (必填才启用)
  port: 17000                  # 监听端口 (被占用时自动递增)


# ── AI 调用参数 ─────────────────────────────────────────────────
ai:
  # 频率惩罚: 降低模型重复用词的概率 (-2.0 ~ 2.0)
  # 越高越不容易重复，建议 1.5 ~ 2.5
  frequency_penalty: 2.0

  # 存在惩罚: 促进模型谈论新话题 (-2.0 ~ 2.0)
  # 越高越倾向于引入新内容，建议 0.8 ~ 1.5
  presence_penalty: 1.0

  # 温度: 控制回复的随机性 (0.0 ~ 2.0)
  # 越高回复越随机/有创意，越低越确定/保守
  # 日常聊天建议 1.0 ~ 1.5，严肃场景建议 0.5 ~ 0.8
  temperature: 1.3

  # 核采样 (top_p): 控制候选词范围 (0.0 ~ 1.0)
  # 越低回复越集中，越高越多样
  # 建议 0.1 ~ 0.3 保持回复质量
  top_p: 0.1

  # 最大回复 token 数
  # 日常聊天建议 1024 ~ 2048，长文生成建议 4096
  max_tokens: 4096

  # 请求超时 (秒)
  request_timeout: 60

  # 分析任务最大 token 数 (记忆提取、情绪分析、自我反思等)
  analysis_max_tokens: 10000

  # 分析任务温度 (越低越确定，建议 0.1 ~ 0.5)
  analysis_temperature: 0.3


# ── 对话参数 ─────────────────────────────────────────────────────
conversation:
  # 对话历史保留轮数 (每轮 = 1条用户消息 + 1条AI回复)
  # 越大上下文越长，但 API 费用越高
  # 建议 5 ~ 15
  max_history: 10

  # 消息合并超时 (毫秒)
  # 用户在短时间内发送的连续消息会合并为一条发给 AI
  # 避免用户分段发送时触发多次 API 调用
  # 建议 4000 ~ 8000
  batch_timeout_ms: 2000

  # 打字模拟速度 (字符/秒)
  # AI 回复按 |^| 分割为多条消息，每条之间根据长度计算延迟
  # 越快越像秒回，越慢越像真人在打字
  # 建议 3.0 ~ 8.0
  typing_speed: 5.0

  # 打字延迟上限 (毫秒)
  # 单条消息的最大等待时间，防止长消息等待过久
  max_typing_delay_ms: 4000

  # 对话跟进超时 (秒)
  # 当用户 @机器人 发起对话后，在此时间内用户的后续消息即使没有 @也会回复
  # 超过此时间后，必须 @机器人才会回复
  # 建议 120 ~ 600
  reply_follow_up_secs: 300

  # 主动插话权重 (0.0 ~ 1.0)
  # 控制机器人在群聊中回复非@消息的倾向
  # 0.0 = 几乎什么都会回复 (话痨)
  # 0.3 = 适度参与 (默认，像正常群友)
  # 0.7 = 比较克制，只回复明显相关的
  # 1.0 = 非常克制，只回复直接相关的
  intrusiveness_weight: 0.3

  # 对同一用户的回复冷却时间 (秒)
  # 防止对同一用户连续回复刷屏
  reply_cooldown_secs: 15

  # 是否允许括号内的动作/表情描述
  # true = AI 可以用"（笑了笑）"、"（叹气）"等描述动作和表情
  # false = AI 只输出纯对话，不带括号描述
  action_descriptions: false


# ── 记忆参数 ─────────────────────────────────────────────────────
memory:
  # 普通记忆过期天数
  # 超过此天数未被访问的普通记忆会被淡忘（不再注入 prompt）
  # 设为 0 则永不过期
  normal_expire_days: 30

  # 重要记忆降权天数
  # 超过此天数未被访问的重要记忆会被标记为 [淡忘]
  important_fade_days: 7

  # 自动摘要触发阈值
  # 对话历史超过此轮数时，自动提取摘要存为普通记忆
  auto_summarize_threshold: 10

  # 群聊工作记忆过期时间 (小时)
  # 所有群聊消息都会临时存储，超过此时间后自动清理
  # 开启群聊时会加载最近的工作记忆作为上下文
  working_memory_expire_hours: 6


# ── 情绪参数 ─────────────────────────────────────────────────────
emotion:
  # 情绪衰减速率 (每小时衰减的强度值)
  # 越高情绪恢复平静越快
  # 0.1 = 约10小时从满强度恢复，0.3 = 约3小时
  decay_rate: 0.15

  # 情绪衰减延迟 (秒)
  # 此时间内情绪不衰减，保持刚变化后的状态
  decay_delay_secs: 60

  # 平静恢复阈值
  # 情绪强度低于此值时自动恢复为 Neutral
  neutral_threshold: 0.15

  # 亲近感阈值 (次/小时)
  # 互动频率超过此值时，AI 会表现得更亲近
  affinity_threshold: 3.0


# ── 主动对话参数 ─────────────────────────────────────────────────
proactive:
  # 是否开启主动对话
  enabled: true

  # 免打扰时段 (24小时制)
  # quiet_start 到 quiet_end 之间不发送主动消息
  # 支持跨午夜: 如 23:00 ~ 07:00
  quiet_start: 23
  quiet_end: 7

  # 主动消息基础间隔 (秒)
  # 用户超过此时间未对话，且满足其他条件时发送问候
  # 7200 = 2小时
  interval: 7200

  # 连续忽略次数上限
  # 用户忽略主动消息达到此次数后，降低发送频率
  max_ignore: 3

  # 低情绪间隔倍率
  # AI 情绪低落 (sad/tired) 时，主动消息间隔乘以此系数
  low_mood_multiplier: 2.0

  # 周期性检查间隔 (秒)
  # 主循环中检查主动消息和情绪衰减的频率
  check_interval: 60


# ── 自我反思参数 ─────────────────────────────────────────────────
# Bot 会定期产生内心想法 (反思最近的对话、记录自己的感受等)
# 偶尔会主动在群里分享想法 (像人自言自语)
self_reflection:
  # 自我反思间隔 (秒)
  # 每隔此时间，bot 会回顾最近的对话并产生内心想法
  # 1800 = 30分钟，建议 900 ~ 3600
  interval: 1800

  # 注入 prompt 的自我记忆条数
  # 所有自我记忆都会永久保存到 self_memory.json
  # 此值只控制每次对话时注入多少条最近的想法作为上下文
  # 建议 5 ~ 15
  max_thoughts: 8

  # 对话结束后多久触发反思 (秒)
  # 对话结束后一段时间，bot 会回顾刚结束的对话产生想法
  # 120 = 2分钟，建议 60 ~ 300
  post_conversation_delay_secs: 120


# ── 心理状态参数 (缺陷/担忧/考量) ──────────────────────────
# 让 AI 拥有拟人化的心理特质：会担忧、有考量、偶尔犯错
mental_state:
  # 最大活跃担忧数
  # 超出上限时最弱的担忧会被替换
  concerns_max: 5

  # 担忧衰减速率 (每小时)
  # 越高担忧消退越快，0.1 = 约10小时从满强度消退
  concern_decay_rate: 0.1

  # 最大活跃考量数
  # 从对话中积累的行事准则和人际洞察
  deliberations_max: 8

  # 考量衰减速率 (每小时)
  # 比担忧衰减更慢，因为考量代表积累的智慧
  deliberation_decay_rate: 0.05

  # 缺陷基础触发概率 (0.0 ~ 1.0)
  # 实际概率还会受情绪状态和强度影响
  # 疲惫/愤怒时缺陷概率更高，开心/平静时更低
  # 0.0 = 禁用缺陷系统
  defect_base_probability: 0.1


# ── 群聊回复配额 (分时段限制回复次数) ───────────────────────
# 以 5 分钟为最小配额段，按时段分配每段的最大回复次数
# 配额用完后消息进入延迟审查，对话结束后由反思机制统一处理
quota:
  enabled: true                 # 是否启用配额系统
  segment_minutes: 5            # 配额段长度 (分钟)
  segments:                     # 各时段每段最大回复次数
    - {start_hour: 0,  end_hour: 6,  max_replies: 5}   # 深夜不回复
    - {start_hour: 6,  end_hour: 8,  max_replies: 20}   # 早上偏少
    - {start_hour: 8,  end_hour: 10, max_replies: 30}   # 正常
    - {start_hour: 10, end_hour: 14, max_replies: 50}   # 活跃
    - {start_hour: 14, end_hour: 16, max_replies: 10}   # 下午偏少
    - {start_hour: 16, end_hour: 20, max_replies: 20}   # 傍晚中等
    - {start_hour: 20, end_hour: 24, max_replies: 10}   # 晚间话少


# ── 回复风格 ─────────────────────────────────────────────────────
style:
  # 单条回复最大字数
  # 越短越像手机打字，越长越能表达复杂意思
  # 建议 20 ~ 50
  max_reply_chars: 30

  # 是否省略主语
  # true  = "我觉得很无聊" → "无聊"、"我在想事情" → "在想事情"
  # false = 正常表达，不刻意省略
  omit_subject: true

  # 标点风格
  # "casual" = 日常发言不加句号，用换行或竖线代替停顿，问句偶尔加问号
  # "formal" = 使用正常标点符号，句末加句号，问句加问号
  punctuation_style: "casual"


# ── 日志配置 ─────────────────────────────────────────────────────
log:
  # 是否启用日志文件输出
  # 日志会写入 data/plugin_ai_chat/logs/ 目录，按天滚动
  enabled: true

  # 日志级别: debug | info | warn | error
  # debug = 所有详细信息 (API 请求/响应、决策过程等)
  # info  = 关键流程 (消息收发、AI 回复、命令执行)
  # warn  = 仅警告和错误
  # error = 仅错误
  level: "info"


# ── 防注入配置 (始终开启，不可关闭) ──────────────────────────
# 多层防护系统：输入层、输出层、行为层
# 注意：关键词过滤、注入模式检测、编码绕过检测、色情/暴力/违法内容检测、
# 输出检测 始终强制开启，无法通过配置关闭
anti_injection:
  input:
    # 最大消息长度 (超过则截断)
    max_message_length: 2000
    # 敏感内容处理方式: replace(替换为安全内容) | block(直接阻止)
    sensitive_action: "block"
  output:
    # 检测到问题时: replace(替换) | block(阻止)
    action: "block"
  behavior:
    # 频率限制
    rate_limit: true
    # 每分钟最大消息数
    max_messages_per_minute: 20
    # 每小时最大消息数
    max_messages_per_hour: 200
    # 信誉分数阈值 (0.0~1.0)，低于此值会受到限制
    reputation_threshold: 0.3
    # 自动封禁
    auto_ban: true
    # 自动封禁触发次数
    auto_ban_threshold: 10


# ── 用户访问控制 ─────────────────────────────────────────────────
# 白名单：只允许这些用户使用私聊（为空则不限制，全体可用）
# 黑名单：禁止这些用户使用私聊（为空则不限制）
# 两个都配置时，白名单优先（只允许白名单用户，黑名单无效）
# whitelist: [123456789, 987654321]
# blacklist: [111111111, 222222222]

# ── 默认启动对话 ─────────────────────────────────────────────────
# 这些用户无需手动发送"开启对话"，启动插件后自动开启私聊
# 也会受到白名单/黑名单的限制
# auto_start_users: [123456789]

# 这些群无需管理员手动发送"开启对话"，启动插件后自动开启群聊
# auto_start_groups: [123456789]


# ── 系统消息模板 ─────────────────────────────────────────────────
messages:
  start:
    success: "对话已开启，你可以开始聊天了。"
    redo: "对话已开启，无需重复操作。"
  stop:
    success: "对话已停止。"
    redo: "对话未开启，无需停止。"
  forget:
    success: "已遗忘对话记录。"
    fail: "没有找到对话记录。"
  restart:
    success: "对话已重启。"
    redo: "没有找到对话记录。"
