# ============================================================
#  top.drluo.luo9-ai-chat 配置文件
#  复制此文件为 config.yaml 并填入实际配置
# ============================================================

# ── API 配置 (必填) ─────────────────────────────────────────────
# OpenAI 兼容接口，支持 DeepSeek / OpenAI / 通义千问 / 硅基流动等

api_key: "sk-xxxxxxxxxxxxxxxxxxxxxxxx"
base_url: "https://api.deepseek.com/v1"
model: "deepseek-chat"

# 机器人自身 QQ 号 (必填)
# 用于判断群消息是否 @了机器人，0 = 未配置（回复所有消息）
self_qq: 123456789

# 管理员 QQ 号 (控制命令权限)
# 只有此人可以使用 "开启对话"、"停!"、"人格管理" 等控制命令
# 设为 0 则所有人可用 (向后兼容)
admin_qq: 123456789

# ── 识图功能 (可选) ─────────────────────────────────────────────
# 配置后 bot 能识别群聊中的图片/表情包，理解其内容后再决定是否回复
# api_key 为空则禁用识图，图片消息会被忽略
vision:
  api_key: ""                                    # 识图 API key，留空 = 禁用
  base_url: "https://ark.cn-beijing.volces.com/api/v3"  # API 地址
  model: "doubao-seed-1-8-251228"                # 识图模型
  max_tokens: 256

# ── 提示词 ─────────────────────────────────────────────────────
# 放在 prompts/ 目录下的文件名

prompts: "default.txt"


# ── AI 调用参数 ─────────────────────────────────────────────────
ai:
  # 频率惩罚: 降低模型重复用词的概率 (-2.0 ~ 2.0)
  # 越高越不容易重复，建议 1.5 ~ 2.5
  frequency_penalty: 2.0

  # 存在惩罚: 促进模型谈论新话题 (-2.0 ~ 2.0)
  # 越高越倾向于引入新内容，建议 0.8 ~ 1.5
  presence_penalty: 1.0

  # 温度: 控制回复的随机性 (0.0 ~ 2.0)
  # 越高回复越随机/有创意，越低越确定/保守
  # 日常聊天建议 1.0 ~ 1.5，严肃场景建议 0.5 ~ 0.8
  temperature: 1.3

  # 核采样 (top_p): 控制候选词范围 (0.0 ~ 1.0)
  # 越低回复越集中，越高越多样
  # 建议 0.1 ~ 0.3 保持回复质量
  top_p: 0.1

  # 最大回复 token 数
  # 日常聊天建议 1024 ~ 2048，长文生成建议 4096
  max_tokens: 4096

  # 请求超时 (秒)
  request_timeout: 60

  # 分析任务最大 token 数 (记忆提取、情绪分析、自我反思等)
  analysis_max_tokens: 10000

  # 分析任务温度 (越低越确定，建议 0.1 ~ 0.5)
  analysis_temperature: 0.3


# ── 对话参数 ─────────────────────────────────────────────────────
conversation:
  # 对话历史保留轮数 (每轮 = 1条用户消息 + 1条AI回复)
  # 越大上下文越长，但 API 费用越高
  # 建议 5 ~ 15
  max_history: 10

  # 消息合并超时 (毫秒)
  # 用户在短时间内发送的连续消息会合并为一条发给 AI
  # 避免用户分段发送时触发多次 API 调用
  # 建议 4000 ~ 8000
  batch_timeout_ms: 6000

  # 打字模拟速度 (字符/秒)
  # AI 回复按 |^| 分割为多条消息，每条之间根据长度计算延迟
  # 越快越像秒回，越慢越像真人在打字
  # 建议 3.0 ~ 8.0
  typing_speed: 5.0

  # 打字延迟上限 (毫秒)
  # 单条消息的最大等待时间，防止长消息等待过久
  max_typing_delay_ms: 4000

  # 对话跟进超时 (秒)
  # 当用户 @机器人 发起对话后，在此时间内用户的后续消息即使没有 @也会回复
  # 超过此时间后，必须 @机器人才会回复
  # 建议 120 ~ 600
  reply_follow_up_secs: 300

  # 主动插话权重 (0.0 ~ 1.0)
  # 控制机器人在群聊中回复非@消息的倾向
  # 0.0 = 几乎什么都会回复 (话痨)
  # 0.3 = 适度参与 (默认，像正常群友)
  # 0.7 = 比较克制，只回复明显相关的
  # 1.0 = 非常克制，只回复直接相关的
  intrusiveness_weight: 0.3

  # 是否允许括号内的动作/表情描述
  # true = AI 可以用"（笑了笑）"、"（叹气）"等描述动作和表情
  # false = AI 只输出纯对话，不带括号描述
  action_descriptions: true


# ── 记忆参数 ─────────────────────────────────────────────────────
memory:
  # 普通记忆过期天数
  # 超过此天数未被访问的普通记忆会被淡忘（不再注入 prompt）
  # 设为 0 则永不过期
  normal_expire_days: 30

  # 重要记忆降权天数
  # 超过此天数未被访问的重要记忆会被标记为 [淡忘]
  important_fade_days: 7

  # 自动摘要触发阈值
  # 对话历史超过此轮数时，自动提取摘要存为普通记忆
  auto_summarize_threshold: 10

  # 群聊工作记忆过期时间 (小时)
  # 所有群聊消息都会临时存储，超过此时间后自动清理
  # 开启群聊时会加载最近的工作记忆作为上下文
  working_memory_expire_hours: 6


# ── 情绪参数 ─────────────────────────────────────────────────────
emotion:
  # 情绪衰减速率 (每小时衰减的强度值)
  # 越高情绪恢复平静越快
  # 0.1 = 约10小时从满强度恢复，0.3 = 约3小时
  decay_rate: 0.15

  # 情绪衰减延迟 (秒)
  # 此时间内情绪不衰减，保持刚变化后的状态
  decay_delay_secs: 60

  # 平静恢复阈值
  # 情绪强度低于此值时自动恢复为 Neutral
  neutral_threshold: 0.15

  # 亲近感阈值 (次/小时)
  # 互动频率超过此值时，AI 会表现得更亲近
  affinity_threshold: 3.0


# ── 主动对话参数 ─────────────────────────────────────────────────
proactive:
  # 是否开启主动对话
  enabled: true

  # 免打扰时段 (24小时制)
  # quiet_start 到 quiet_end 之间不发送主动消息
  # 支持跨午夜: 如 23:00 ~ 07:00
  quiet_start: 23
  quiet_end: 7

  # 主动消息基础间隔 (秒)
  # 用户超过此时间未对话，且满足其他条件时发送问候
  # 7200 = 2小时
  interval: 7200

  # 连续忽略次数上限
  # 用户忽略主动消息达到此次数后，降低发送频率
  max_ignore: 3

  # 低情绪间隔倍率
  # AI 情绪低落 (sad/tired) 时，主动消息间隔乘以此系数
  low_mood_multiplier: 2.0

  # 周期性检查间隔 (秒)
  # 主循环中检查主动消息和情绪衰减的频率
  check_interval: 60


# ── 自我反思参数 ─────────────────────────────────────────────────
# Bot 会定期产生内心想法 (反思最近的对话、记录自己的感受等)
# 偶尔会主动在群里分享想法 (像人自言自语)
self_reflection:
  # 自我反思间隔 (秒)
  # 每隔此时间，bot 会回顾最近的对话并产生内心想法
  # 1800 = 30分钟，建议 900 ~ 3600
  interval: 1800

  # 注入 prompt 的自我记忆条数
  # 所有自我记忆都会永久保存到 self_memory.json
  # 此值只控制每次对话时注入多少条最近的想法作为上下文
  # 建议 5 ~ 15
  max_thoughts: 8

  # 对话结束后多久触发反思 (秒)
  # 对话结束后一段时间，bot 会回顾刚结束的对话产生想法
  # 120 = 2分钟，建议 60 ~ 300
  post_conversation_delay_secs: 120


# ── 系统消息模板 ─────────────────────────────────────────────────
messages:
  start:
    success: "对话已开启，你可以开始聊天了。"
    redo: "对话已开启，无需重复操作。"
  stop:
    success: "对话已停止。"
    redo: "对话未开启，无需停止。"
  forget:
    success: "已遗忘对话记录。"
    fail: "没有找到对话记录。"
  restart:
    success: "对话已重启。"
    redo: "没有找到对话记录。"
