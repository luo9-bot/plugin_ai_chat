<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luo9 AI Chat - Multi-Character Test</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; height: 100vh; overflow: hidden; }
.header { background: #161b22; padding: 12px 20px; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 16px; color: #58a6ff; white-space: nowrap; }
.header .status { font-size: 12px; color: #8b949e; margin-left: 8px; }
.header .status.connected { color: #3fb950; }
.header .status.error { color: #f85149; }
.header button { margin-left: auto; }

/* Layout */
.main { display: flex; height: calc(100vh - 49px); }
.left { width: 280px; min-width: 280px; border-right: 1px solid #30363d; display: flex; flex-direction: column; overflow: hidden; }
.center { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.right { width: 380px; min-width: 380px; border-left: 1px solid #30363d; display: flex; flex-direction: column; overflow: hidden; }

/* Scrollable sections */
.scroll { overflow-y: auto; flex: 1; }
.section-header { font-size: 12px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 12px 6px; border-bottom: 1px solid #21262d; background: #161b22; position: sticky; top: 0; z-index: 1; }
.section-header button { float: right; margin-top: -4px; padding: 2px 8px; font-size: 11px; }

/* Character cards */
.char-card { padding: 10px 12px; border-bottom: 1px solid #21262d; cursor: pointer; transition: background 0.15s; }
.char-card:hover { background: #161b22; }
.char-card.active { background: #1f2a3a; border-left: 3px solid #58a6ff; }
.char-card .char-name { font-size: 14px; font-weight: 500; }
.char-card .char-id { font-size: 11px; color: #8b949e; }
.char-card .char-persona { font-size: 11px; color: #6e7681; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.char-add { padding: 8px 12px; }
.char-add input, .char-add button { margin-bottom: 4px; }

/* Chat area */
.chat-area { flex: 1; overflow-y: auto; padding: 12px; }
.chat-msg { margin-bottom: 8px; max-width: 85%; }
.chat-msg .bubble { padding: 8px 12px; border-radius: 12px; font-size: 13px; line-height: 1.5; word-break: break-word; }
.chat-msg .meta { font-size: 10px; color: #8b949e; margin-bottom: 2px; }
.chat-msg.char { margin-right: auto; }
.chat-msg.char .bubble { background: #1f2a3a; border-bottom-left-radius: 4px; }
.chat-msg.bot { margin-left: auto; }
.chat-msg.bot .bubble { background: #1a2e1a; border-bottom-right-radius: 4px; }
.chat-msg.bot .meta { text-align: right; }
.chat-msg .char-tag { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 10px; font-weight: 500; margin-right: 4px; }
.chat-msg.system { text-align: center; }
.chat-msg.system .bubble { background: transparent; color: #6e7681; font-size: 12px; font-style: italic; }

/* Input area */
.input-area { padding: 12px; border-top: 1px solid #30363d; background: #161b22; }
.input-row { display: flex; gap: 8px; }
.input-row textarea { flex: 1; min-height: 38px; max-height: 120px; resize: none; }
.input-row button { align-self: flex-end; white-space: nowrap; }
.input-hint { font-size: 11px; color: #6e7681; margin-top: 4px; }

/* Tabs for right panel */
.tabs { display: flex; background: #161b22; border-bottom: 1px solid #30363d; }
.tab { padding: 8px 16px; font-size: 12px; color: #8b949e; cursor: pointer; border-bottom: 2px solid transparent; }
.tab.active { color: #c9d1d9; border-bottom-color: #58a6ff; }
.tab:hover { color: #c9d1d9; }
.tab-content { display: none; flex: 1; overflow: hidden; }
.tab-content.active { display: flex; flex-direction: column; }

/* Context display */
.ctx-section { padding: 8px 12px; border-bottom: 1px solid #21262d; }
.ctx-section h3 { font-size: 11px; color: #d29922; margin-bottom: 4px; }
.ctx-section pre { font-size: 11px; color: #c9d1d9; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto; background: #0d1117; padding: 8px; border-radius: 4px; border: 1px solid #21262d; }

/* State display */
.kv { padding: 4px 12px; font-size: 12px; display: flex; gap: 8px; border-bottom: 1px solid #161b22; }
.kv .k { color: #8b949e; min-width: 100px; }
.kv .v { color: #c9d1d9; }

/* Log display */
.log-entry { padding: 8px 12px; border-bottom: 1px solid #21262d; font-size: 12px; cursor: pointer; }
.log-entry:hover { background: #161b22; }
.log-entry .log-time { color: #8b949e; font-size: 11px; }
.log-entry .log-user { color: #58a6ff; }
.log-entry .log-msg { color: #c9d1d9; margin: 2px 0; }
.log-entry .log-reply { color: #3fb950; }
.log-entry .log-detail { display: none; margin-top: 8px; }
.log-entry.expanded .log-detail { display: block; }

/* Tag colors */
.tag-c0 { background: #1f3a3a; color: #58a6ff; }
.tag-c1 { background: #3a1f3a; color: #bc8cff; }
.tag-c2 { background: #3a3a1f; color: #d29922; }
.tag-c3 { background: #1f3a1f; color: #3fb950; }
.tag-c4 { background: #3a1f1f; color: #f85149; }
.tag-c5 { background: #1f2a3a; color: #79c0ff; }

/* Auto-play controls */
.autoplay-bar { padding: 8px 12px; border-top: 1px solid #21262d; background: #161b22; display: flex; gap: 8px; align-items: center; }
.autoplay-bar select, .autoplay-bar input { width: auto; flex: none; }
.autoplay-bar .round-info { font-size: 12px; color: #8b949e; }

/* Common */
button { background: #238636; color: #fff; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
button:hover { background: #2ea043; }
button.secondary { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
button.secondary:hover { background: #30363d; }
button.danger { background: #da3633; }
button.danger:hover { background: #f85149; }
button:disabled { opacity: 0.5; cursor: not-allowed; }
input, select, textarea { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 6px 10px; border-radius: 6px; font-size: 12px; }
input:focus, select:focus, textarea:focus { border-color: #58a6ff; outline: none; }
textarea { font-family: inherit; }
.loading { display: inline-block; width: 12px; height: 12px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.feat-tag { padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 500; }
.feat-pending { background: #21262d; color: #8b949e; }
.feat-done { background: #1f3a1f; color: #3fb950; }
.feat-active { background: #3a2f1f; color: #d29922; }
pre { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 10px; font-size: 11px; overflow: auto; white-space: pre-wrap; word-break: break-all; }
</style>
</head>
<body>

<div class="header">
  <h1>Luo9 AI Chat Test</h1>
  <span class="status" id="serverStatus">disconnected</span>
  <button class="secondary" onclick="fetchState()">Refresh State</button>
  <button class="secondary" onclick="resetServer()">Reset Server</button>
  <button class="secondary" onclick="exportLogs()">Export Logs</button>
</div>

<div class="main">
  <!-- Left: Characters -->
  <div class="left">
    <div class="section-header">Test Characters</div>
    <div class="scroll" id="charList"></div>
    <div class="char-add">
      <input id="newCharName" placeholder="Nickname" style="width:100%">
      <input id="newCharId" placeholder="User ID (number)" type="number" style="width:100%">
      <input id="newCharPersona" placeholder="Personality (optional)" style="width:100%">
      <button class="secondary" onclick="addCharacter()" style="width:100%">Add Character</button>
    </div>
  </div>

  <!-- Center: Chat -->
  <div class="center">
    <div class="section-header">
      Conversation
      <button class="secondary" onclick="clearChat()">Clear</button>
    </div>
    <div class="chat-area" id="chatArea"></div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="msgInput" placeholder="Type message... (Enter to send, Shift+Enter for newline)" onkeydown="handleInputKey(event)"></textarea>
        <button onclick="sendMessage()" id="sendBtn">Send</button>
      </div>
      <div class="input-hint">
        Speaking as: <strong id="speakingAs">none</strong> |
        Group: <input id="groupId" type="number" value="676426335" style="width:100px;padding:2px 6px">
      </div>
    </div>
    <div class="autoplay-bar" style="flex-wrap:wrap;gap:6px">
      <span style="font-size:12px;color:#8b949e">AI Auto-test:</span>
      <input id="autoRounds" type="number" value="15" min="1" max="50" style="width:50px" title="Max rounds">
      <span style="font-size:11px;color:#8b949e">max rounds</span>
      <button onclick="startAutoPlay()" id="autoBtn">Start Full Test</button>
      <button class="danger" onclick="stopAutoPlay()" id="autoStopBtn" style="display:none">Stop</button>
      <span class="round-info" id="autoInfo"></span>
      <div id="featureCoverage" style="width:100%;display:flex;flex-wrap:wrap;gap:4px;margin-top:4px"></div>
    </div>
  </div>

  <!-- Right: Details -->
  <div class="right">
    <div class="tabs">
      <div class="tab active" onclick="switchRightTab('ctx', this)">Context</div>
      <div class="tab" onclick="switchRightTab('state', this)">State</div>
      <div class="tab" onclick="switchRightTab('log', this)">Logs</div>
    </div>

    <div class="tab-content active" id="tab-ctx">
      <div class="scroll" id="ctxContent">
        <div style="padding:20px;text-align:center;color:#6e7681;font-size:12px">
          Send a message to see the AI context
        </div>
      </div>
    </div>

    <div class="tab-content" id="tab-state">
      <div class="scroll" id="stateContent">
        <div style="padding:20px;text-align:center;color:#6e7681;font-size:12px">
          Click "Refresh State" to load
        </div>
      </div>
    </div>

    <div class="tab-content" id="tab-log">
      <div class="scroll" id="logContent">
        <div style="padding:20px;text-align:center;color:#6e7681;font-size:12px">
          Logs will appear after messages are sent
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const API = 'http://127.0.0.1:18923';

// Fetch with timeout (server is single-threaded, AI calls can be slow)
async function apiFetch(path, opts = {}, timeoutMs = 90000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const resp = await fetch(API + path, { ...opts, signal: controller.signal });
    clearTimeout(timer);
    return resp;
  } catch (e) {
    clearTimeout(timer);
    if (e.name === 'AbortError') throw new Error('Request timed out (server busy)');
    throw e;
  }
}

// ── State ──────────────────────────────────────────────────
let characters = [
  { id: 1111111111, name: '璃', persona: '群主，喜欢夜宵，性格活泼', color: 0 },
  { id: 2222222222, name: '洛屿', persona: '喜欢咖啡，温柔安静', color: 1 },
  { id: 123456789, name: '小明', persona: '活泼开朗的学生', color: 2 },
];
let activeCharIdx = 0;
const selfQQ = 999999; // 机器人自身 QQ 号，与 config.yaml 一致
let chatHistory = []; // {role, content, userId, charName, charColor, timestamp}
let autoPlaying = false;
let autoTimer = null;
let serverConnected = false;

// ── Initialization ──────────────────────────────────────────
renderCharacters();
checkConnection();

async function checkConnection() {
  try {
    const r = await apiFetch('/api/config');
    if (r.ok) {
      serverConnected = true;
      const el = document.getElementById('serverStatus');
      el.textContent = 'connected';
      el.className = 'status connected';
      const cfg = await r.json();
      el.textContent = `connected | model: ${cfg.model}`;
    }
  } catch (e) {
    serverConnected = false;
    const el = document.getElementById('serverStatus');
    el.textContent = 'disconnected (start: cargo run --bin test_server --no-default-features)';
    el.className = 'status error';
  }
}

// ── Character management ──────────────────────────────────
function renderCharacters() {
  const el = document.getElementById('charList');
  el.innerHTML = characters.map((c, i) => `
    <div class="char-card ${i === activeCharIdx ? 'active' : ''}" onclick="selectChar(${i})">
      <div class="char-name"><span class="char-tag tag-c${c.color}">${c.name}</span></div>
      <div class="char-id">ID: ${c.id}</div>
      <div class="char-persona">${c.persona || '(no personality)'}</div>
    </div>
  `).join('');
  document.getElementById('speakingAs').textContent = characters[activeCharIdx]?.name || 'none';
}

function selectChar(idx) {
  activeCharIdx = idx;
  renderCharacters();
}

function addCharacter() {
  const name = document.getElementById('newCharName').value.trim();
  const id = parseInt(document.getElementById('newCharId').value);
  const persona = document.getElementById('newCharPersona').value.trim();
  if (!name || !id) return alert('Name and ID are required');
  if (characters.some(c => c.id === id)) return alert('ID already exists');
  characters.push({ id, name, persona, color: characters.length % 6 });
  document.getElementById('newCharName').value = '';
  document.getElementById('newCharId').value = '';
  document.getElementById('newCharPersona').value = '';
  renderCharacters();
}

// ── Chat ──────────────────────────────────────────────────
function handleInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';

  const char = characters[activeCharIdx];
  if (!char) return;

  // Add user message to chat
  addChatMessage('char', msg, char);
  input.style.height = 'auto';

  // Send to server
  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;
  sendBtn.innerHTML = '<span class="loading"></span>';

  try {
    const groupId = parseInt(document.getElementById('groupId').value) || 0;
    const resp = await apiFetch('/api/simulate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        group_id: groupId,
        user_id: char.id,
        nickname: char.name,
        message: msg,
      }),
    });

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const result = await resp.json();

    if (result.error) {
      addChatMessage('system', `Error: ${result.error}`);
    } else if (result.decided_to_reply === false) {
      addChatMessage('system', `Bot chose not to reply: ${result.decide_reason || ''}`);
      renderContext(result);
      fetchLogs();
    } else {
      addChatMessage('bot', result.reply);
      renderContext(result);
      fetchLogs();
    }
  } catch (e) {
    addChatMessage('system', `Request failed: ${e.message}`);
  } finally {
    sendBtn.disabled = false;
    sendBtn.textContent = 'Send';
  }
}

function addChatMessage(role, content, char) {
  const entry = {
    role, content,
    userId: char?.id,
    charName: char?.name,
    charColor: char?.color ?? 0,
    timestamp: Date.now(),
  };
  chatHistory.push(entry);
  renderChatMessage(entry);
}

function renderChatMessage(entry) {
  const el = document.getElementById('chatArea');
  const div = document.createElement('div');

  if (entry.role === 'system') {
    div.className = 'chat-msg system';
    div.innerHTML = `<div class="bubble">${escHtml(entry.content)}</div>`;
  } else if (entry.role === 'char') {
    div.className = 'chat-msg char';
    div.innerHTML = `
      <div class="meta"><span class="char-tag tag-c${entry.charColor}">${escHtml(entry.charName)}</span></div>
      <div class="bubble">${formatCQCodes(escHtml(entry.content))}</div>
    `;
  } else {
    div.className = 'chat-msg bot';
    div.innerHTML = `
      <div class="meta">Bot</div>
      <div class="bubble">${formatBotReply(entry.content)}</div>
    `;
  }

  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function formatBotReply(text) {
  // Replace |^| with line breaks for display
  return formatCQCodes(text.replace(/\|\^\|/g, '\n'));
}

function formatCQCodes(text) {
  // Convert CQ at codes to readable @Name format
  text = text.replace(/\[CQ:at,qq=(\d+)\]/g, (match, qq) => {
    const char = characters.find(c => c.id === parseInt(qq));
    const name = char ? char.name : (parseInt(qq) === selfQQ ? 'Bot' : qq);
    return `<span style="color:#58a6ff;font-weight:500">@${escHtml(name)}</span>`;
  });
  return text;
}

function clearChat() {
  chatHistory = [];
  document.getElementById('chatArea').innerHTML = '';
}

// ── Context display ──────────────────────────────────────
function renderContext(result) {
  const el = document.getElementById('ctxContent');
  let html = '';

  // decide_reply context
  if (result.context?.decide_reply) {
    html += `<div class="ctx-section"><h3>decide_reply context (${result.context.decide_reply.length} parts)</h3>`;
    for (const part of result.context.decide_reply) {
      html += `<pre>${escHtml(part)}</pre>`;
    }
    html += '</div>';
  }

  // process_message context
  if (result.context?.process_message) {
    html += `<div class="ctx-section"><h3>process_message context (${result.context.process_message.length} parts)</h3>`;
    for (const part of result.context.process_message) {
      html += `<pre>${escHtml(part)}</pre>`;
    }
    html += '</div>';
  }

  // Analysis result
  if (result.analysis) {
    html += `<div class="ctx-section"><h3>AI Analysis</h3>`;
    html += `<div class="kv"><span class="k">Emotion</span><span class="v">${result.analysis.emotion} (${result.analysis.emotion_intensity.toFixed(2)})</span></div>`;
    if (result.analysis.memories_extracted?.length) {
      html += `<div class="kv"><span class="k">Memories</span><span class="v">`;
      for (const [content, importance] of result.analysis.memories_extracted) {
        html += `<div>[${importance}] ${escHtml(content)}</div>`;
      }
      html += '</span></div>';
    }
    html += '</div>';
  }

  // Timing
  html += `<div class="ctx-section"><h3>Performance</h3>`;
  html += `<div class="kv"><span class="k">Response time</span><span class="v">${result.elapsed_ms}ms</span></div>`;
  html += '</div>';

  el.innerHTML = html;
}

// ── State ──────────────────────────────────────────────────
async function fetchState() {
  try {
    const r = await apiFetch('/api/state');
    const state = await r.json();
    renderState(state);
  } catch (e) {
    document.getElementById('stateContent').innerHTML =
      `<div style="padding:20px;color:#f85149">Failed: ${e.message}</div>`;
  }
}

function renderState(state) {
  const el = document.getElementById('stateContent');
  let html = '';

  // Stats
  if (state.stats) {
    html += `<div class="ctx-section"><h3>Stats</h3>`;
    html += `<div class="kv"><span class="k">Memory users</span><span class="v">${state.stats.memory_users}</span></div>`;
    html += `<div class="kv"><span class="k">WM groups</span><span class="v">${state.stats.working_memory_groups}</span></div>`;
    html += '</div>';
  }

  // Memory
  if (state.memory?.users) {
    html += `<div class="ctx-section"><h3>Long-term Memory</h3>`;
    for (const [uid, user] of Object.entries(state.memory.users)) {
      const char = characters.find(c => c.id == uid);
      const label = char ? char.name : `User ${uid}`;
      html += `<div style="margin-bottom:8px"><strong>${label}</strong>: `;
      html += user.entries.map(e => `<span style="color:#6e7681">[${e.importance}]</span> ${escHtml(e.content)}`).join(', ');
      html += '</div>';
    }
    html += '</div>';
  }

  // Working memory
  if (state.working_memory?.groups) {
    html += `<div class="ctx-section"><h3>Working Memory</h3>`;
    for (const [gid, group] of Object.entries(state.working_memory.groups)) {
      html += `<div style="margin-bottom:8px"><strong>Group ${gid}</strong> (${group.entries.length} entries)</div>`;
      for (const e of group.entries.slice(-10)) {
        const char = characters.find(c => c.id === e.user_id);
        const name = char ? char.name : e.user_id;
        const tag = e.bot_replied ? '✓' : '✗';
        html += `<div class="kv"><span class="k">${name} ${tag}</span><span class="v">${escHtml(e.content)}</span></div>`;
      }
    }
    html += '</div>';
  }

  // Emotion
  if (state.emotion && Object.keys(state.emotion).length) {
    html += `<div class="ctx-section"><h3>Emotions</h3>`;
    for (const [uid, emo] of Object.entries(state.emotion)) {
      const char = characters.find(c => c.id == uid);
      const label = char ? char.name : `User ${uid}`;
      html += `<div class="kv"><span class="k">${label}</span><span class="v">${emo.emotion} (${emo.intensity.toFixed(2)})</span></div>`;
    }
    html += '</div>';
  }

  // Archive
  if (state.archive) {
    const wm = state.archive.working_memory?.length || 0;
    const lt = state.archive.long_term?.length || 0;
    html += `<div class="ctx-section"><h3>Archive</h3>`;
    html += `<div class="kv"><span class="k">Working memory</span><span class="v">${wm} entries</span></div>`;
    html += `<div class="kv"><span class="k">Long-term</span><span class="v">${lt} entries</span></div>`;
    html += '</div>';
  }

  el.innerHTML = html || '<div style="padding:20px;color:#6e7681">No state data</div>';
}

// ── Logs ──────────────────────────────────────────────────
async function fetchLogs() {
  try {
    const r = await apiFetch('/api/log');
    const logs = await r.json();
    renderLogs(logs);
  } catch (e) {}
}

function renderLogs(logs) {
  const el = document.getElementById('logContent');
  if (!logs.length) {
    el.innerHTML = '<div style="padding:20px;color:#6e7681">No logs yet</div>';
    return;
  }

  let html = '';
  for (let i = logs.length - 1; i >= 0; i--) {
    const log = logs[i];
    const time = new Date(log.timestamp).toLocaleTimeString();
    const input = log.input;
    const char = characters.find(c => c.id === input.user_id);
    const name = char ? char.name : input.nickname || input.user_id;

    html += `<div class="log-entry" onclick="this.classList.toggle('expanded')">`;
    html += `<div class="log-time">${time} | ${name} (${input.user_id})</div>`;
    html += `<div class="log-msg">${escHtml(input.message)}</div>`;
    html += `<div class="log-reply">→ ${escHtml(log.reply?.substring(0, 80) || '')}${(log.reply?.length || 0) > 80 ? '...' : ''}</div>`;

    // Detail
    html += `<div class="log-detail"><pre>${escHtml(JSON.stringify(log, null, 2))}</pre></div>`;
    html += '</div>';
  }

  el.innerHTML = html;
}

async function exportLogs() {
  try {
    const r = await apiFetch('/api/log');
    const logs = await r.json();
    const blob = new Blob([JSON.stringify(logs, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `test_logs_${new Date().toISOString().slice(0, 19).replace(/:/g, '-')}.json`;
    a.click();
    URL.revokeObjectURL(url);
  } catch (e) {
    alert('Failed to export: ' + e.message);
  }
}

// ── Reset ──────────────────────────────────────────────────
async function resetServer() {
  if (!confirm('Reset all server state?')) return;
  try {
    await apiFetch('/api/reset', { method: 'POST' });
    clearChat();
    fetchState();
    fetchLogs();
  } catch (e) {
    alert('Reset failed: ' + e.message);
  }
}

function switchRightTab(tab, el) {

  document.querySelectorAll('.right .tab-content').forEach(c => c.classList.remove('active'));

// ── Auto-play (AI Orchestrator) ─────────────────────────────

const TEST_OBJECTIVES = [
  { id: 'basic_reply', label: 'Basic Reply', desc: 'Bot replies to a direct message' },
  { id: 'follow_up', label: 'Follow-up', desc: 'Character responds to bot, bot continues' },
  { id: 'memory_test', label: 'Memory', desc: 'Character shares personal info, later recalled' },
  { id: 'emotion_detection', label: 'Emotion', desc: 'Messages with clear emotional content' },
  { id: 'group_memory_sharing', label: 'Group Memory', desc: 'A mentions B, bot knows who B is' },
  { id: 'cross_conversation', label: 'Cross Chat', desc: 'Multiple threads, bot picks right one' },
  { id: 'batch_messages', label: 'Batch', desc: 'Rapid multi-message, bot consolidates' },
  { id: 'working_memory', label: 'Working Mem', desc: 'Unreplied messages still remembered' },
];

let completedObjectives = new Set();

function renderCoverage() {
  const el = document.getElementById('featureCoverage');
  el.innerHTML = TEST_OBJECTIVES.map(o => {
    const cls = completedObjectives.has(o.id) ? 'feat-done' : 'feat-pending';
    return `<span class="feat-tag ${cls}" title="${o.desc}">${completedObjectives.has(o.id) ? '✓' : '○'} ${o.label}</span>`;
  }).join('');
}

function detectObjective(message, reply, chatHistory) {
  const msg = message.toLowerCase();
  const histLen = chatHistory.length;

  // basic_reply: bot replied
  if (reply && reply.length > 0) {
    completedObjectives.add('basic_reply');
  }

  // follow_up: last message was bot, now character replies
  if (histLen >= 2) {
    const prev = chatHistory[histLen - 2];
    if (prev.role === 'bot' && reply) {
      completedObjectives.add('follow_up');
    }
  }

  // emotion_detection: keywords
  if (/开心|高兴|难过|生气|愤怒|伤心|兴奋|紧张|害怕|失望|激动|烦|爽|爽|哭了|笑死|哈哈|呜呜|啊啊/.test(msg)) {
    completedObjectives.add('emotion_detection');
  }

  // memory_test: personal info sharing
  if (/我叫|我的名字|我喜欢|我生日|我住|我在|我的|记住|记得/.test(msg)) {
    completedObjectives.add('memory_test');
  }

  // group_memory_sharing: mentioning another character
  const otherChars = characters.filter(c => !msg.includes(c.name));
  for (const c of characters) {
    if (msg.includes(c.name) || msg.includes(c.name.replace(/[^一-鿿]/g, ''))) {
      // Someone is mentioned
      if (msg.indexOf(c.name) >= 0) {
        completedObjectives.add('group_memory_sharing');
        break;
      }
    }
  }

  // batch_messages: detected by multiple recent messages from same user
  const recentSameUser = chatHistory.slice(-4).filter(m => m.role === 'char' && m.userId === chatHistory[histLen - 1]?.userId);
  if (recentSameUser.length >= 2) {
    completedObjectives.add('batch_messages');
  }

  // cross_conversation: bot was asked while other conversation ongoing
  if (histLen >= 3) {
    const last3 = chatHistory.slice(-3);
    const users = new Set(last3.filter(m => m.role === 'char').map(m => m.userId));
    if (users.size >= 2) {
      completedObjectives.add('cross_conversation');
    }
  }

  // working_memory: will be checked if unreplied messages exist in state
  completedObjectives.add('working_memory');

  renderCoverage();
}

async function startAutoPlay() {
  if (!serverConnected) return alert('Server not connected');
  if (characters.length < 2) return alert('Add at least 2 characters');

  const maxRounds = parseInt(document.getElementById('autoRounds').value) || 15;
  autoPlaying = true;
  completedObjectives = new Set();
  renderCoverage();
  document.getElementById('autoBtn').style.display = 'none';
  document.getElementById('autoStopBtn').style.display = '';

  for (let round = 0; round < maxRounds && autoPlaying; round++) {
    const remaining = TEST_OBJECTIVES.filter(o => !completedObjectives.has(o.id)).map(o => o.id);

    document.getElementById('autoInfo').textContent = `Round ${round + 1}/${maxRounds} — ${completedObjectives.size}/${TEST_OBJECTIVES.length} features covered`;

    try {
      // 1. Ask AI orchestrator: who speaks next and what do they say?
      const stepResp = await apiFetch('/api/auto_play_step', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          characters: characters.map(c => ({ id: c.id, name: c.name, persona: c.persona || '' })),
          chat_history: chatHistory.slice(-15).map(m => ({
            role: m.role,
            name: m.charName || (m.role === 'bot' ? 'Bot' : 'System'),
            content: m.content,
            user_id: m.userId,
          })),
          objectives: TEST_OBJECTIVES.map(o => o.id),
          completed: [...completedObjectives],
        }),
      });

      if (!stepResp.ok) throw new Error(`auto_play_step HTTP ${stepResp.status}`);
      const step = await stepResp.json();
      if (step.error) throw new Error(`Orchestrator: ${step.error}`);
      if (!autoPlaying) break;

      // 2. Update active character
      activeCharIdx = step.speaker_index;
      renderCharacters();

      const char = characters[step.speaker_index];
      document.getElementById('autoInfo').textContent =
        `Round ${round + 1}: ${char.name} → Bot (${step.reasoning || ''})`;

      // 3. Show character message
      addChatMessage('char', step.message, char);

      // 4. Send to bot via simulate
      const groupId = parseInt(document.getElementById('groupId').value) || 0;
      const simResp = await apiFetch('/api/simulate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          group_id: groupId,
          user_id: char.id,
          nickname: char.name,
          message: step.message,
        }),
      });

      if (simResp.ok) {
        const result = await simResp.json();
        if (!result.error) {
          if (result.decided_to_reply === false) {
            addChatMessage('system', `Bot chose not to reply: ${result.decide_reason || ''}`);
            renderContext(result);
            // Bot not replying still counts for working_memory
            completedObjectives.add('working_memory');
            renderCoverage();
          } else {
            addChatMessage('bot', result.reply);
            renderContext(result);
            detectObjective(step.message, result.reply, chatHistory);
          }
        } else {
          addChatMessage('system', `Bot Error: ${result.error}`);
        }
      }

      fetchLogs();
      fetchState();

      // Check if all objectives covered
      if (completedObjectives.size >= TEST_OBJECTIVES.length) {
        addChatMessage('system', `All ${TEST_OBJECTIVES.length} features covered! Test complete.`);
        break;
      }

    } catch (e) {
      addChatMessage('system', `Error: ${e.message}`);
    }

    if (round < maxRounds - 1 && autoPlaying) {
      await new Promise(r => setTimeout(r, 1500));
    }
  }

  stopAutoPlay();
}

function stopAutoPlay() {
  autoPlaying = false;
  document.getElementById('autoBtn').style.display = '';
  document.getElementById('autoStopBtn').style.display = 'none';
  document.getElementById('autoInfo').textContent = autoPlaying ? 'Stopped' : 'Done';
  setTimeout(() => {
    if (!autoPlaying) document.getElementById('autoInfo').textContent = '';
  }, 3000);
}

// ── Utils ──────────────────────────────────────────────────
function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
