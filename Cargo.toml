[package]
name = "top_drluo_luo9_ai_chat"
version = "3.0.0"
edition = "2024"
description = "AI Chat plugin for Luo9 Bot"
authors = ["drluo"]

[features]
default = ["plugin"]
plugin = []

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
luo9_sdk = "0.5.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
ureq = "3.3"
once_cell = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "registry", "local-time"] }
tracing-appender = "0.2"
time = { version = "0.3", features = ["local-offset", "macros"] }
